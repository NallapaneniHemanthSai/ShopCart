server:
  port: 8080

spring:
  application:
    name: shopping-cart-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shoppingcart}
    username: ${DB_USER:shoppingcart}
    password: ${DB_PASSWORD:shoppingcart}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-minimum-256-bits-long-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  cart:
    delivery-charge: 49.00
    free-delivery-threshold: 999.00
  admin:
    seed-email: admin@shoppingcart.local
    seed-password: Admin@123

logging:
  level:
    com.shoppingcart: INFO
