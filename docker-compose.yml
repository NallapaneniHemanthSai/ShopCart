services:
  postgres:
    image: postgres:16-alpine
    container_name: shoppingcart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shoppingcart
      POSTGRES_USER: shoppingcart
      POSTGRES_PASSWORD: shoppingcart
    ports:
      - "5432:5432"
    volumes:
      - shoppingcart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoppingcart -d shoppingcart"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: shoppingcart-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shoppingcart
      DB_USER: shoppingcart
      DB_PASSWORD: shoppingcart
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: shoppingcart-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  shoppingcart_pgdata:
